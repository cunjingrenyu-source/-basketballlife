<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASKETBALL LIFE</title>
    <style>
        /* ================= 全体・レイアウト設定 ================= */
        * { box-sizing: border-box; }
        body { background-color: #f1f2f6; color: #333; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 850px; min-height: 100vh; background-color: #ffffff; box-shadow: 0 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        button { cursor: pointer; transition: all 0.2s; }
        button:hover { opacity: 0.9; }
        
        /* ================= ヘッダー＆ナビゲーション ================= */
        .header { background-color: #1e272e; color: #fff; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 3px solid #ff6600; }
        .header h1 { margin: 0; font-size: 22px; color: #ff6600; cursor: pointer; font-weight: 900; letter-spacing: 1px; }
        .menu-btn { background: #ff6600; color: #fff; border: none; padding: 8px 16px; border-radius: 4px; font-weight: bold; }
        .nav-menu { display: none; background: #2f3640; padding: 10px; gap: 8px; overflow-x: auto; justify-content: flex-start; }
        .nav-menu button { background: #353b48; color: #fff; border: 1px solid #718093; padding: 8px 14px; border-radius: 4px; white-space: nowrap; font-weight: bold; font-size: 13px; }
        .nav-menu button.active { background: #ff6600; border-color: #ff6600; }

        /* ================= コンテンツエリア共通 ================= */
        .content-area { padding: 20px; flex: 1; }
        h2 { color: #1e272e; border-left: 5px solid #ff6600; padding-left: 10px; font-size: 20px; margin-top: 0; margin-bottom: 20px; }
        .clickable-team { color: #2980b9; cursor: pointer; font-weight: bold; text-decoration: underline; }
        .clickable-team:hover { color: #c0392b; }
        .clickable-player { color: #2c3e50; cursor: pointer; font-weight: bold; }
        .clickable-player:hover { color: #ff6600; text-decoration: underline; }

        /* ================= 選手作成（ガチャ要素） ================= */
        .reg-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .reg-table th, .reg-table td { border: 1px solid #dcdde1; padding: 12px; }
        .reg-table th { background-color: #f5f6fa; width: 30%; font-size: 14px; text-align: left; }
        .reg-table input, .reg-table select { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #ccc; border-radius: 4px; }
        .submit-btn { background-color: #2ecc71; color: white; border: none; padding: 12px 50px; font-size: 18px; font-weight: bold; border-radius: 4px; display: block; margin: 20px auto 0; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .icon-preview { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 3px solid #ff6600; display: block; margin-top: 8px; background: #eee; }

        /* ================= プロフィール・スタッツ表示 ================= */
        .player-banner { color: #fff; padding: 20px; border-radius: 6px; display: flex; align-items: center; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer; }
        .banner-icon { width: 75px; height: 75px; border-radius: 50%; margin-right: 20px; object-fit: cover; border: 3px solid #fff; background: #fff; }
        .banner-info .team-name { font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.3); padding: 3px 8px; border-radius: 3px; display: inline-block; margin-bottom: 6px; }
        .banner-info .player-detail { font-size: 24px; font-weight: bold; text-shadow: 1px 1px 3px rgba(0,0,0,0.6); }
        .banner-role { font-size: 12px; background: #ff6600; color: #fff; padding: 2px 6px; border-radius: 3px; margin-left: 10px; vertical-align: middle; }

        .stats-table { width: 100%; border-collapse: collapse; margin-top: 15px; text-align: center; font-size: 13px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stats-table th { background: #2f3640; color: #fff; padding: 8px 5px; border: 1px solid #444; }
        .stats-table td { padding: 8px 5px; border: 1px solid #dcdde1; background: #fff; }
        .stats-table tr:nth-child(even) td { background: #f8f9fa; }
        
        .play-match-btn { background: linear-gradient(135deg, #e74c3c, #c0392b); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 18px; font-weight: bold; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* ランクバッジ */
        .rank { display: inline-block; padding: 2px 6px; border-radius: 3px; color: #fff; font-weight: bold; font-size: 11px; margin-left: 5px;}
        .rank-S { background: #9b59b6; } .rank-A { background: #e74c3c; } .rank-B { background: #e67e22; }
        .rank-C { background: #f1c40f; color: #000; } .rank-D { background: #2ecc71; }
        .rank-E { background: #3498db; } .rank-F { background: #7f8c8d; }

        /* ================= 順位表 ================= */
        .conf-title { background: #1e272e; color: #fff; padding: 8px 12px; margin-top: 20px; margin-bottom: 5px; font-size: 16px; font-weight: bold; border-radius: 4px; }
        .standings-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: center; margin-bottom: 20px; }
        .standings-table th { background: #dcdde1; color: #2f3640; padding: 10px; border: 1px solid #b2bec3; }
        .standings-table td { padding: 10px; border: 1px solid #dcdde1; background: #fff; }

        /* ================= 試合実況画面 ================= */
        .match-header { display: flex; justify-content: space-between; background: #f5f6fa; padding: 15px; font-weight: bold; font-size: 20px; border-radius: 6px; align-items: center; border: 1px solid #dcdde1; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .match-score { font-size: 32px; color: #e74c3c; font-family: 'Impact', sans-serif; letter-spacing: 2px; }
        .match-log-box { background: #1e272e; color: #f5f6fa; height: 480px; overflow-y: auto; padding: 15px; font-family: 'Courier New', monospace; font-size: 13px; border-radius: 6px; margin-top: 15px; line-height: 1.6; }
        .log-entry { margin-bottom: 10px; border-bottom: 1px solid #2f3640; padding-bottom: 8px; }
        .log-time { color: #f1c40f; font-weight: bold; }
        .log-score { color: #2ecc71; font-weight: bold; margin-left: 8px;}
        .log-team { font-weight: bold; color: #0fb9b1; }
        .log-action { color: #ffffff; }
        .tactics-badge { font-size: 11px; padding: 2px 6px; background: #718093; color: #fff; border-radius: 3px; margin-left: 5px; font-weight: normal; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- ヘッダー (タイトルクリックでいつでもホームへ飛べる) -->
    <div class="header">
        <h1 onclick="goHome()">BASKETBALL LIFE</h1>
        <button class="menu-btn" onclick="toggleMenu()">MENU ▼</button>
    </div>
    <div id="nav-menu" class="nav-menu">
        <button id="btn-nav-home" onclick="changeView('home')">🏠 ホーム</button>
        <button id="btn-nav-standings" onclick="changeView('standings')">🏆 順位表 / 日程</button>
        <button id="btn-nav-reg" onclick="openNewRegistration()">➕ 新選手作成 (入替)</button>
    </div>

    <!-- 選手登録画面 -->
    <div id="reg-view" class="content-area">
        <h2>プロバスケ志望届 (新規作成・リーグ参入)</h2>
        <table class="reg-table">
            <tr><th>選手アイコン</th><td>
                <input type="file" id="reg-icon" accept="image/*">
                <img id="icon-preview" class="icon-preview" src="">
            </td></tr>
            <tr><th>選手名</th><td><input type="text" id="reg-name" placeholder="例: ザック・ラビーン"></td></tr>
            <tr><th>ポジション</th><td><select id="reg-pos"><option value="PG">PG (ポイントガード)</option><option value="SG">SG (シューティングガード)</option><option value="SF">SF (スモールフォワード)</option><option value="PF">PF (パワーフォワード)</option><option value="C">C (センター)</option></select></td></tr>
            <tr><th>アピールポイント<br><small style="color:red;font-weight:normal;">※C〜Dランク確定</small></th><td>
                <select id="reg-appeal">
                    <option value="layupDunk">レイアップ / ダンク</option><option value="middle">ミドルシュート</option><option value="three">スリーポイント</option>
                    <option value="shootDribble">シュートオブドリブル</option><option value="dribble">ドリブルテクニック</option>
                    <option value="playmaking">プレイメイキング(パス)</option><option value="physical">フィジカルパワー</option><option value="rebound">リバウンド</option>
                    <option value="agility">俊敏性(スピード)</option><option value="defense">ディフェンス</option><option value="mental">メンタル(クラッチ力)</option><option value="stamina">スタミナ</option>
                </select>
            </td></tr>
        </table>
        <p style="font-size:12px; color:#7f8c8d;">※アピールポイント以外は全て初期ガチャ(F〜Eランク)のリアル仕様。強い選手になれるかは運次第！</p>
        <button class="submit-btn" onclick="registerPlayer()">ドラフト・リーグへ参入</button>
    </div>

    <!-- ホーム画面 -->
    <div id="home-view" class="content-area" style="display: none;">
        <h2>マイプレイヤー状況</h2>
        <div id="home-profile-target"></div>
        <div id="home-game-info" style="margin-top:15px; padding:10px; background:#f5f6fa; border-radius:4px; font-weight:bold; text-align:center;"></div>
        <button class="play-match-btn" id="match-trigger-btn" onclick="playCurrentRound()">▶ 次の公式戦(第1節)をシミュレート</button>
    </div>

    <!-- 順位表画面 -->
    <div id="standings-view" class="content-area" style="display: none;">
        <h2>リーグ順位表 & シーズン進捗</h2>
        <div style="text-align: right; font-weight: bold; margin-bottom: 10px;" id="standings-progress"></div>
        
        <div class="conf-title">🔵 イースタン・カンファレンス (15チーム)</div>
        <table class="standings-table" id="east-table"></table>

        <div class="conf-title">🔴 ウェスタン・カンファレンス (15チーム)</div>
        <table class="standings-table" id="west-table"></table>
    </div>

    <!-- チームロスター画面 -->
    <div id="roster-view" class="content-area" style="display: none;">
        <button onclick="changeView('standings')" style="margin-bottom: 15px; padding: 6px 12px;">← 順位表に戻る</button>
        <h2 id="roster-team-name">チーム名</h2>
        <div id="team-tactics-info" style="font-size:13px; margin-bottom:10px; font-weight:bold; color:#7f8c8d;"></div>
        <table class="stats-table" id="roster-table"></table>
    </div>

    <!-- 試合実況画面 -->
    <div id="match-view" class="content-area" style="display: none;">
        <button onclick="goHome()" style="margin-bottom: 15px; padding: 6px 15px; font-weight:bold;">← ホームへ戻る</button>
        <div class="match-header">
            <span id="match-team1" class="clickable-team">Team A</span>
            <span id="match-score" class="match-score">0 - 0</span>
            <span id="match-team2" class="clickable-team">Team B</span>
        </div>
        <div class="match-log-box" id="match-log"></div>
    </div>
    
    <!-- 選手詳細(スタッツ・能力)画面 -->
    <div id="player-detail-view" class="content-area" style="display: none;">
        <button id="detail-back-btn" onclick="changeView('home')" style="margin-bottom: 15px; padding: 6px 12px;">← 戻る</button>
        <div id="detail-profile-target"></div>
        
        <h3 style="font-size: 15px; margin-top: 20px; border-bottom: 2px solid #ff6600; padding-bottom:5px;">現在能力パラメータ</h3>
        <div id="detail-stats" style="font-size:13px; line-height: 1.8; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background:#f9f9f9; padding:12px; border-radius:4px;"></div>

        <h3 style="font-size: 15px; margin-top: 20px; border-bottom: 2px solid #ff6600; padding-bottom:5px;">直近5試合の個人結果スタッツ</h3>
        <table class="stats-table" id="recent-games-table"></table>
    </div>
</div>

<script>
    // --- 定数・ゲーム設定 ---
    const MAX_SHOOT = 150; const MAX_NORMAL = 100;
    const POSITIONS = ["PG", "SG", "SF", "PF", "C"];
    const ROLES = ["エース", "シューター", "リバウンダー", "司令塔", "ディフェンダー"];
    const TACTICS = [
        { name: "ラン＆ガン", desc: "ペースが非常に速く、3Pと速攻レイアップを量産する" },
        { name: "インサイド中心", desc: "インサイドを制圧し、ゴール下レイアップを徹底追求する" },
        { name: "3P中心", desc: "アウトサイドパス回しから超高確率で3Pシュートを狙う" },
        { name: "ディフェンス重視", desc: "強固な守備網で相手の成功率を極限まで削り取る" }
    ];
    
    // NBAを模した30チームの都市名リスト
    const TEAM_NAMES = [
        // イースト15
        "ボストン", "ブルックリン", "ニューヨーク", "フィラデルフィア", "トロント", "シカゴ", "クリーブランド", "デトロイト", "インディアナ", "ミルウォーキー", "アトランタ", "シャーロット", "マイアミ", "オーランド", "ワシントン",
        // ウェスト15
        "デンバー", "ミネソタ", "オクラホマシティ", "ポートランド", "ユタ", "ゴールデンステイト", "ロサンゼルス L", "ロサンゼルス C", "フェニックス", "サクラメント", "ダラス", "ヒューストン", "メンフィス", "ニューオーリンズ", "サンアントニオ"
    ];

    let teams = []; let allPlayers = []; let currentUser = null; 
    let playerIdCounter = 1; let currentRound = 1; let totalRounds = 82;
    let userIconBase64 = ""; let schedule = [];

    // 画像選択時のプレビュー処理
    document.getElementById('reg-icon').addEventListener('change', function(e) {
        let file = e.target.files[0]; if(!file) return;
        let reader = new FileReader();
        reader.onload = function(evt) {
            userIconBase64 = evt.target.result;
            document.getElementById('icon-preview').src = userIconBase64;
        };
        reader.readAsDataURL(file);
    });

    // --- ランク計算 ---
    function getRank(val, max) {
        let p = (val / max) * 100;
        if (p >= 90) return 'S'; if (p >= 75) return 'A'; if (p >= 60) return 'B';
        if (p >= 45) return 'C'; if (p >= 30) return 'D'; if (p >= 15) return 'E'; return 'F';
    }

    // --- ガチャ初期値生成 (通常はE〜F、アピールはC〜D) ---
    function rollStat(max, isAppeal = false) {
        if (isAppeal) {
            // C〜Dランク (パーセンテージで35%〜55%)
            let minVal = Math.floor(max * 0.35); let maxVal = Math.floor(max * 0.55);
            return Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
        } else {
            // F〜Eランク (パーセンテージで10%〜32%)
            let minVal = Math.floor(max * 0.10); let maxVal = Math.floor(max * 0.32);
            return Math.floor(Math.random() * (maxVal - minVal + 1)) + minVal;
        }
    }

    function createStats(appealPoint = null) {
        return {
            layupDunk: rollStat(MAX_SHOOT, appealPoint === 'layupDunk'), middle: rollStat(MAX_SHOOT, appealPoint === 'middle'),
            three: rollStat(MAX_SHOOT, appealPoint === 'three'), shootDribble: rollStat(MAX_SHOOT, appealPoint === 'shootDribble'),
            dribble: rollStat(MAX_NORMAL, appealPoint === 'dribble'), playmaking: rollStat(MAX_NORMAL, appealPoint === 'playmaking'),
            physical: rollStat(MAX_NORMAL, appealPoint === 'physical'), rebound: rollStat(MAX_NORMAL, appealPoint === 'rebound'),
            agility: rollStat(MAX_NORMAL, appealPoint === 'agility'), defense: rollStat(MAX_NORMAL, appealPoint === 'defense'),
            mental: rollStat(MAX_NORMAL, appealPoint === 'mental'), injuryResist: rollStat(MAX_NORMAL, appealPoint === 'injuryResist'),
            stamina: rollStat(MAX_NORMAL, appealPoint === 'stamina')
        };
    }

    function createBoxScore() {
        return { g:0, gs:0, min:0, pts:0, reb:0, ast:0, stl:0, blk:0, fgm:0, fga:0, tpm:0, tpa:0, ftm:0, fta:0 };
    }

    // --- リーグ・COM選手（役割・個性の追加）初期化 ---
    function initWorld() {
        teams = []; allPlayers = []; currentRound = 1;
        
        for (let i = 0; i < 30; i++) {
            let conf = (i < 15) ? "East" : "West";
            let color = (conf === "East") ? `hsl(${(i*24)%360}, 65%, 35%)` : `hsl(${(i*24+180)%360}, 65%, 35%)`;
            let team = {
                id: i + 1, name: TEAM_NAMES[i], conference: conf, color: color,
                roster: [], w: 0, l: 0, pf: 0, pa: 0, tactics: TACTICS[Math.floor(Math.random() * TACTICS.length)]
            };

            let numberPool = Array.from({length: 100}, (_, k) => k).sort(() => Math.random() - 0.5);
            let rolesShuffled = [...ROLES, ...ROLES, ...ROLES].sort(() => Math.random() - 0.5);

            POSITIONS.forEach((pos, posIdx) => {
                for (let j = 0; j < 3; j++) {
                    let role = rolesShuffled.pop();
                    let comStats = createStats();
                    
                    // 役割(ロール)に応じた尖ったCOM能力値の補正
                    if (role === "エース") { comStats.layupDunk += 40; comStats.middle += 40; comStats.three += 30; }
                    else if (role === "シューター") { comStats.three += 55; comStats.middle += 40; }
                    else if (role === "リバウンダー") { comStats.rebound += 45; comStats.physical += 40; }
                    else if (role === "司令塔") { comStats.playmaking += 45; comStats.dribble += 45; comStats.agility += 30; }
                    else if (role === "ディフェンダー") { comStats.defense += 45; comStats.agility += 30; comStats.physical += 30; }

                    let p = {
                        id: playerIdCounter++, teamId: team.id, isUser: false, name: `${team.name}のCOM-${pos}${j+1}`,
                        pos: pos, role: role, num: numberPool.pop(), stats: comStats, box: createBoxScore(), recent: [], icon: ""
                    };
                    team.roster.push(p); allPlayers.push(p);
                }
            });
            teams.push(team);
        }
        generate82Schedule();
    }

    // 82試合の総当たり日程をシンプルかつ均等に生成
    function generate82Schedule() {
        schedule = [];
        for (let r = 1; r <= totalRounds; r++) {
            let roundMatches = []; let visited = new Set();
            let pool = [...teams].sort(() => Math.random() - 0.5);
            while(pool.length >= 2) {
                let t1 = pool.pop(); let t2 = pool.pop();
                roundMatches.push({ home: t1.id, away: t2.id });
            }
            schedule.push(roundMatches);
        }
    }

    // --- プレイヤー参入・上書き（マルチ登録対応） ---
    function registerPlayer() {
        let name = document.getElementById('reg-name').value || "登録ルーキー";
        let pos = document.getElementById('reg-pos').value;
        let appeal = document.getElementById('reg-appeal').value;

        // ユーザーも割り当てられたポジションから適切なロールを自動設定
        let userRole = "エース";
        if(["three", "middle"].includes(appeal)) userRole = "シューター";
        if(["rebound", "physical"].includes(appeal)) userRole = "リバウンダー";
        if(["playmaking", "dribble", "agility"].includes(appeal)) userRole = "司令塔";
        if(["defense"].includes(appeal)) userRole = "ディフェンダー";

        currentUser = {
            id: playerIdCounter++, isUser: true, name: name, pos: pos, role: userRole, icon: userIconBase64,
            stats: createStats(appeal), box: createBoxScore(), recent: [], teamId: null
        };

        // ランダムなチームの、同一ポジションの「3番手(ベンチ)」COM選手と入れ替えることで参入
        let targetTeam = teams[Math.floor(Math.random() * 30)];
        currentUser.teamId = targetTeam.id;
        
        let comIdx = targetTeam.roster.findIndex(p => p.pos === pos && !p.isUser);
        if(comIdx === -1) comIdx = targetTeam.roster.findIndex(p => p.pos === pos);
        
        currentUser.num = targetTeam.roster[comIdx].num; 
        
        // リーグからそのCOMを除外し、新しいプレイヤーを入れる
        let oldCom = targetTeam.roster[comIdx];
        allPlayers = allPlayers.filter(p => p.id !== oldCom.id);
        targetTeam.roster.splice(comIdx, 1, currentUser);
        allPlayers.push(currentUser);

        document.getElementById('reg-view').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        goHome();
    }

    function openNewRegistration() {
        document.getElementById('reg-name').value = "";
        document.getElementById('icon-preview').src = "";
        userIconBase64 = "";
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('reg-view').style.display = 'block';
        toggleMenu();
    }

    // --- UI制御 ---
    function goHome() { changeView('home'); }
    function toggleMenu() { let m = document.getElementById('nav-menu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
    
    function changeView(viewName) {
        ['home','standings','roster','match','player-detail'].forEach(v => document.getElementById(v+'-view').style.display = 'none');
        ['btn-nav-home','btn-nav-standings'].forEach(id => {
            let el = document.getElementById(id);
            if(el) el.classList.remove('active');
        });

        if(viewName === 'home') {
            document.getElementById('home-profile-target').innerHTML = generateProfileHTML(currentUser);
            document.getElementById('home-game-info').innerText = `シーズン進捗: ${currentRound - 1} / ${totalRounds} 試合終了`;
            let btn = document.getElementById('match-trigger-btn');
            if(currentRound > totalRounds) {
                btn.innerText = "🏆 シーズン全日程終了"; btn.disabled = true;
            } else {
                btn.innerText = `▶ 第 ${currentRound} 節の公式戦を開始する`; btn.disabled = false;
            }
            let hBtn = document.getElementById('btn-nav-home'); if(hBtn) hBtn.classList.add('active');
        }
        if(viewName === 'standings') {
            renderStandings();
            let sBtn = document.getElementById('btn-nav-standings'); if(sBtn) sBtn.classList.add('active');
        }
        document.getElementById(viewName+'-view').style.display = 'block';
        document.getElementById('nav-menu').style.display = 'none'; // メニューは閉じる
    }

    // --- プロファイルHTML生成 ---
    function calcPct(m, a) { return a > 0 ? ((m/a)*100).toFixed(1)+"%" : "0.0%"; }
    function calcAvg(v, g) { return g > 0 ? (v/g).toFixed(1) : "0.0"; }
    function calcMin(sec, g) { 
        if(g===0) return "0:00"; 
        let m = Math.floor((sec/g)/60); let s = Math.floor((sec/g)%60); 
        return `${m}:${s.toString().padStart(2,'0')}`; 
    }

    function generateProfileHTML(player) {
        let t = teams.find(x => x.id === player.teamId);
        let b = player.box;
        let iconSrc = player.icon || "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23ccc'/></svg>";
        
        return `
        <div class="player-banner" style="background: linear-gradient(135deg, ${t.color}, #2f3640);" onclick="showPlayerDetail(${player.id})">
            <img class="banner-icon" src="${iconSrc}">
            <div class="banner-info">
                <div class="team-name" onclick="event.stopPropagation(); showRoster(${t.id})">${t.name} (戦術:${t.tactics.name})</div>
                <div class="player-detail">
                    <span>#${player.num}</span> ${player.pos} | ${player.name}
                    <span class="banner-role">${player.role}</span>
                </div>
            </div>
        </div>
        <table class="stats-table">
            <tr><th>ｼｰｽﾞﾝ</th><th>ﾁｰﾑ</th><th>G</th><th>GS</th><th>MIN</th><th>PTS</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>FG%</th><th>3P%</th></tr>
            <tr><td>26-27</td><td class="clickable-team" onclick="event.stopPropagation(); showRoster(${t.id})">${t.name}</td>
            <td>${b.g}</td><td>${b.gs}</td><td>${calcMin(b.min, b.g)}</td>
            <td><strong>${calcAvg(b.pts,b.g)}</strong></td><td>${calcAvg(b.reb,b.g)}</td><td>${calcAvg(b.ast,b.g)}</td>
            <td>${calcAvg(b.stl,b.g)}</td><td>${calcAvg(b.blk,b.g)}</td>
            <td>${calcPct(b.fgm, b.fga)}</td><td>${calcPct(b.tpm, b.tpa)}</td></tr>
        </table>`;
    }

    function showPlayerDetail(id) {
        let p = allPlayers.find(x => x.id === id);
        document.getElementById('detail-profile-target').innerHTML = generateProfileHTML(p);
        
        // 戻り先ボタンの挙動調整
        let backBtn = document.getElementById('detail-back-btn');
        if (p.id === currentUser.id) {
            backBtn.setAttribute("onclick", "changeView('home')");
        } else {
            backBtn.setAttribute("onclick", `showRoster(${p.teamId})`);
        }

        let html = "";
        const statKeys = [
            {k:'layupDunk', n:'レイアップ/ダンク', m:MAX_SHOOT}, {k:'middle', n:'ミドルシュート', m:MAX_SHOOT}, {k:'three', n:'スリーポイント', m:MAX_SHOOT}, {k:'shootDribble', n:'シュートオブドリブル', m:MAX_SHOOT},
            {k:'dribble', n:'ドリブル技能', m:MAX_NORMAL}, {k:'playmaking', n:'プレイメイク(パス)', m:MAX_NORMAL}, {k:'physical', n:'フィジカルパワー', m:MAX_NORMAL}, {k:'rebound', n:'リバウンド能力', m:MAX_NORMAL},
            {k:'agility', n:'俊敏性(スピード)', m:MAX_NORMAL}, {k:'defense', n:'ディフェンス力', m:MAX_NORMAL}, {k:'mental', n:'メンタル(勝負強さ)', m:MAX_NORMAL}, {k:'stamina', n:'スタミナ総量', m:MAX_NORMAL}
        ];
        statKeys.forEach(s => {
            let val = p.stats[s.k]; let r = getRank(val, s.m);
            html += `<div>${s.n}: <strong>${val}</strong> <span class="rank rank-${r}">${r}</span></div>`;
        });
        document.getElementById('detail-stats').innerHTML = html;

        let rt = document.getElementById('recent-games-table');
        rt.innerHTML = `<tr><th>節</th><th>MIN</th><th>PTS</th><th>REB</th><th>AST</th><th>STL</th><th>BLK</th><th>FG%</th><th>3P%</th></tr>`;
        p.recent.slice(-5).reverse().forEach((r, idx) => {
            let fpc = r.fga > 0 ? Math.floor((r.fgm/r.fga)*100)+"%" : "-";
            let tpc = r.tpa > 0 ? Math.floor((r.tpm/r.tpa)*100)+"%" : "-";
            rt.innerHTML += `<tr><td>第${p.recent.length - idx}節</td><td>${Math.floor(r.min/60)}分</td><td>${r.pts}</td><td>${r.reb}</td><td>${r.ast}</td><td>${r.stl}</td><td>${r.blk}</td><td>${fpc}</td><td>${tpc}</td></tr>`;
        });

        changeView('player-detail');
    }

    function renderStandings() {
        document.getElementById('standings-progress').innerText = `シーズン消化: ${currentRound - 1} / 82 試合`;
        
        const makeTable = (targetId, confName) => {
            let tbl = document.getElementById(targetId);
            tbl.innerHTML = `<tr><th>順位</th><th>チーム</th><th>戦術</th><th>勝</th><th>敗</th><th>勝率</th><th>総得点</th><th>総失点</th></tr>`;
            let filtered = teams.filter(t => t.conference === confName).sort((a,b) => {
                if(b.w !== a.w) return b.w - a.w;
                return (b.pf - b.pa) - (a.pf - a.pa);
            });
            filtered.forEach((t, idx) => {
                let wp = (t.w + t.l) > 0 ? (t.w / (t.w + t.l)).toFixed(3) : ".000";
                tbl.innerHTML += `<tr>
                    <td><strong>${idx+1}</strong></td>
                    <td class="clickable-team" onclick="showRoster(${t.id})" style="color:${t.color}; text-align:left; padding-left:15px;">${t.name}</td>
                    <td style="font-size:11px; color:#7f8c8d;">${t.tactics.name}</td>
                    <td><strong>${t.w}</strong></td><td>${t.l}</td><td>${wp}</td><td>${t.pf}</td><td>${t.pa}</td>
                </tr>`;
            });
        };
        makeTable("east-table", "East");
        makeTable("west-table", "West");
    }

    function showRoster(teamId) {
        let t = teams.find(x => x.id === teamId);
        document.getElementById('roster-team-name').innerText = `${t.name} ロスター`;
        document.getElementById('roster-team-name').style.color = t.color;
        document.getElementById('team-tactics-info').innerText = `チーム戦術: 【${t.tactics.name}】 - ${t.tactics.desc}`;
        
        let tbl = document.getElementById('roster-table');
        tbl.innerHTML = `<tr style="background:#2f3640; color:#fff;"><th>#</th><th>Pos</th><th>選手役割</th><th>名前</th><th>G</th><th>MIN</th><th>PTS</th><th>REB</th><th>AST</th></tr>`;
        
        // ポジション順にソートして綺麗に見せる
        let sorted = [];
        POSITIONS.forEach(pos => { sorted.push(...t.roster.filter(p=>p.pos===pos)); });

        sorted.forEach((p, idx) => {
            let b = p.box; let isStarter = (t.roster.filter(x=>x.pos===p.pos)[0].id === p.id);
            let tr = document.createElement('tr');
            if(p.id === currentUser.id) tr.style.background = "#fff0f0";
            tr.innerHTML = `<td>#${p.num}</td><td>${isStarter ? '★ ' : ''}${p.pos}</td>
                <td><span style="font-size:11px; padding:2px 4px; background:#eee; border-radius:3px;">${p.role}</span></td>
                <td class="clickable-player" onclick="showPlayerDetail(${p.id})">${p.name} ${p.id===currentUser.id?'(YOU)':''}</td>
                <td>${b.g}</td><td>${calcMin(b.min, b.g)}</td><td><strong>${calcAvg(b.pts,b.g)}</strong></td><td>${calcAvg(b.reb,b.g)}</td><td>${calcAvg(b.ast,b.g)}</td>`;
            tbl.appendChild(tr);
        });
        changeView('roster');
    }

    // --- 全チーム同時進行＆試合シミュレーションエンジン ---
    function playCurrentRound() {
        if(currentRound > totalRounds) return;
        let roundMatches = schedule[currentRound - 1];
        let userMatch = null;

        // ユーザーの試合を探す
        roundMatches.forEach(m => {
            if(m.home === currentUser.teamId || m.away === currentUser.teamId) {
                userMatch = m;
            } else {
                // バックグラウンドで他のCOMチーム同士の試合をリアルタイム確率ベースで高速処理
                simulateMatch(teams.find(t=>t.id===m.home), teams.find(t=>t.id===m.away), false);
            }
        });

        // ユーザーの所属するチームの試合はログを詳細表示
        if(userMatch) {
            changeView('match');
            simulateMatch(teams.find(t=>t.id===userMatch.home), teams.find(t=>t.id===userMatch.away), true);
        }
        currentRound++;
    }

    // コアとなる新・シュート＆戦術シミュレーションエンジン
    function simulateMatch(homeTeam, awayTeam, isVisual) {
        let score = { home: 0, away: 0 };
        let logs = [];
        let pStats = {};

        // AI監督: スタメン選出 (各ポジションで一番能力の高いプレイヤーを抜擢)
        const selectStarters = (team) => {
            let onCourt = []; let bench = [];
            POSITIONS.forEach(pos => {
                let sortedPos = team.roster.filter(p => p.pos === pos).sort((a,b) => {
                    return (b.stats.layupDunk + b.stats.defense) - (a.stats.layupDunk + a.stats.defense);
                });
                onCourt.push(sortedPos[0]);
                bench.push(...sortedPos.slice(1));
            });
            team.roster.forEach(p => {
                pStats[p.id] = { curStam: 100, gameBox: createBoxScore() };
                p.box.g++; if(onCourt.includes(p)) { p.box.gs++; pStats[p.id].gameBox.gs = 1; }
            });
            return { onCourt, bench };
        };

        let hLine = selectStarters(homeTeam); let aLine = selectStarters(awayTeam);

        // 使用率（Usage）のウェイト計算
        // 役割(ロール)とチーム戦術の掛け算で使用率を算出し、オフェンスの頻度を決定する
        const getPlayerWeights = (onCourt, tactics) => {
            return onCourt.map(p => {
                let w = 10; // ベース
                if(p.role === "エース") w += 35;
                if(p.role === "シューター") w += 20;
                if(p.role === "司令塔") w += 15;
                
                // 戦術補正
                if(tactics.name === "3P中心" && p.role === "シューター") w += 25;
                if(tactics.name === "インサイド中心" && p.pos === "C") w += 20;
                return { p: p, weight: w };
            });
        };

        const chooseAttacker = (weights) => {
            let total = weights.reduce((sum, w) => sum + w.weight, 0);
            let r = Math.random() * total; let current = 0;
            for(let i=0; i<weights.length; i++) {
                current += weights[i].weight;
                if(r <= current) return weights[i].p;
            }
            return weights[0].p;
        };

        // ログ追加
        const pushLog = (timeStr, text) => {
            if(!isVisual) return;
            logs.push(`<div class="log-entry"><span class="log-time">${timeStr}</span> ${text} <span class="log-score">[${score.home} - ${score.away}]</span></div>`);
        };

        if(isVisual) {
            logs.push(`<div>🏀 <strong>試合開始!!</strong> 【H】${homeTeam.name} (${homeTeam.tactics.name}) vs 【A】${awayTeam.name} (${awayTeam.tactics.name})</div><hr>`);
        }

        // NBAのリアルな攻撃回数（両チーム合わせて約180〜200ポゼッション）を4Qで消化
        let hasBall = Math.random() > 0.5 ? "home" : "away";
        
        for (let q = 1; q <= 4; q++) {
            pushLog(`Q${q} 12:00`, `第${q}クォーター開始`);
            let qTime = 720; // 12分

            while(qTime > 0) {
                let posTime = Math.floor(Math.random() * 8) + 14; // 1ポゼッション14〜22秒
                qTime -= posTime; if(qTime < 0) qTime = 0;
                let timeStr = `Q${q} ${Math.floor(qTime/60)}:${(qTime%60).toString().padStart(2,'0')}`;

                let offT = (hasBall === "home") ? homeTeam : awayTeam;
                let defT = (hasBall === "home") ? awayTeam : homeTeam;
                let offLine = (hasBall === "home") ? hLine : aLine;
                let defLine = (hasBall === "home") ? aLine : hLine;

                // 出場選手のスタミナ消費・加算
                offLine.onCourt.forEach(p => { pStats[p.id].curStam -= 1.8; pStats[p.id].gameBox.min += posTime; });
                defLine.onCourt.forEach(p => { pStats[p.id].curStam -= 1.8; pStats[p.id].gameBox.min += posTime; });
                offLine.bench.forEach(p => { pStats[p.id].curStam += 2.5; if(pStats[p.id].curStam > 100) pStats[p.id].curStam = 100; });
                defLine.bench.forEach(p => { pStats[p.id].curStam += 2.5; if(pStats[p.id].curStam > 100) pStats[p.id].curStam = 100; });

                // AI監督のリアルタイム交代（スタミナが65以下になったら控えと交代）
                const checkAIChange = (line, tName) => {
                    for(let i=0; i<5; i++) {
                        let p = line.onCourt[i];
                        if(pStats[p.id].curStam < 65) {
                            let freshBench = line.bench.find(b => b.pos === p.pos && pStats[b.id].curStam > 85);
                            if(freshBench) {
                                line.onCourt[i] = freshBench;
                                line.bench.splice(line.bench.indexOf(freshBench), 1, p);
                                if(isVisual) logs.push(`<div style="color:#bdc3c7; font-size:12px;">[AI監督交代] ${tName}: ${p.name} ➔ ${freshBench.name} (スタミナ管理)</div>`);
                            }
                        }
                    }
                };
                checkAIChange(hLine, homeTeam.name); checkAIChange(aLine, awayTeam.name);

                // 使用率に基づきオフェンスプレイヤーを決定
                let weights = getPlayerWeights(offLine.onCourt, offT.tactics);
                let shooter = chooseAttacker(weights);
                let defender = defLine.onCourt[Math.floor(Math.random() * 5)];
                let sb = pStats[shooter.id].gameBox;

                // クラッチ局面（4Q 残り3分以内で5点差以内）のメンタル補正
                let mentalBuff = 1.0;
                if(q === 4 && qTime <= 180 && Math.abs(score.home - score.away) <= 5) {
                    mentalBuff = 1.0 + (shooter.stats.mental / 100) * 0.25; // 最大25%バフ
                }

                // ディフェンス重視チームのデバフ
                let defTacticsDebuff = (defT.tactics.name === "Defense First") ? 0.9 : 1.0;

                // ターンオーバー・スティール判定
                let toChance = (defender.stats.defense + defender.stats.agility) / ((shooter.stats.dribble + shooter.stats.playmaking) * 3 + 10);
                if(Math.random() < toChance * 0.18) {
                    pStats[defender.id].gameBox.stl++;
                    pushLog(timeStr, `<span class="log-team">${offT.name}</span> の ${shooter.name} から ${defender.name} が強烈なスティール！`);
                    hasBall = (hasBall === "home") ? "away" : "home"; continue;
                }

                // シュート選択（戦術・ポジション依存）
                let shotType = "layup"; // デフォルト
                let r = Math.random();
                if(offT.tactics.name === "3P中心") {
                    shotType = (r < 0.6) ? "three" : (r < 0.85) ? "middle" : "layup";
                } else if(offT.tactics.name === "インサイド中心") {
                    shotType = (r < 0.15) ? "three" : (r < 0.35) ? "middle" : "layup";
                } else { // 通常・ランガン等
                    if(shooter.role === "シューター") shotType = (r < 0.55) ? "three" : "middle";
                    else if(shooter.pos === "C" || shooter.pos === "PF") shotType = (r < 0.1) ? "three" : (r < 0.3) ? "middle" : "layup";
                    else shotType = (r < 0.25) ? "three" : (r < 0.6) ? "middle" : "layup";
                }

                let offStat = shooter.stats.layupDunk;
                let successMapBase = 0.40; // ベース成功率引き上げ（得点力UPのため）
                let typeName = "インサイドレイアップ";

                if(shotType === "three") {
                    offStat = shooter.stats.three; successMapBase = 0.28; typeName = "変幻自在の3Pシュート";
                    sb.tpa++;
                } else if(shotType === "middle") {
                    offStat = shooter.stats.middle; successMapBase = 0.35; typeName = "精確なミドルレンジジャンパー";
                } else if(shotType === "shootDribble") {
                    offStat = shooter.stats.shootDribble; successMapBase = 0.38; typeName = "ドリブルからのプルアップシュート";
                }

                sb.fga++;

                // 【要望の厳密再現】能力値(30〜150)が成功率にダイレクトに反映される数式
                // 例: 150なら約70%、90なら約50%になるよう調整
                let statFactor = (offStat / MAX_SHOOT) * 0.45; 
                let staminaFactor = (pStats[shooter.id].curStam < 70) ? 0.85 : 1.0; // スタミナ切れペナルティ
                let finalSuccessRate = (successMapBase + statFactor) * mentalBuff * defTacticsDebuff * staminaFactor;

                // シュート成否判定
                if(Math.random() < finalSuccessRate) {
                    sb.fgm++;
                    let pts = (shotType === "three") ? 3 : 2;
                    sb.pts += pts;
                    if(shotType === "three") sb.tpm++;

                    if(hasBall === "home") score.home += pts; else score.away += pts;

                    // アシスト判定
                    let passer = offLine.onCourt[Math.floor(Math.random()*5)];
                    let astText = "";
                    if(passer.id !== shooter.id && Math.random() < (passer.stats.playmaking / 120)) {
                        pStats[passer.id].gameBox.ast++;
                        astText = ` (${passer.name} の精密なアシスト)`;
                    }

                    pushLog(timeStr, `<span class="log-team">${offT.name}</span> ${shooter.name} が${typeName}を沈める！${astText}`);
                    hasBall = (hasBall === "home") ? "away" : "home";
                } else {
                    // 失敗時のブロック判定
                    if(Math.random() < (defender.stats.defense + defender.stats.physical) / 950) {
                        pStats[defender.id].gameBox.blk++;
                        pushLog(timeStr, `<span class="log-team">${defT.name}</span> ${defender.name} が空中で叩き落とす超絶ブロック！`);
                    } else {
                        pushLog(timeStr, `<span class="log-team">${offT.name}</span> ${shooter.name} のシュートはリングに弾かれる`);
                    }

                    // リバウンド争い (フィジカルとリバウンド値の因果関係)
                    let rebWeights = offLine.onCourt.concat(defLine.onCourt).map(p => {
                        let bonus = (p.role === "リバウンダー") ? 40 : 0;
                        return { p: p, power: p.stats.rebound + p.stats.physical * 0.6 + bonus + Math.random() * 30 };
                    });
                    rebWeights.sort((a,b) => b.power - a.power);
                    let reber = rebWeights[0].p;
                    pStats[reber.id].gameBox.reb++;

                    let isOffReb = offLine.onCourt.includes(reber);
                    pushLog(timeStr, `${reber.name} が激しい空中戦を制してリバウンドを確保。`);
                    
                    hasBall = isOffReb ? hasBall : ((hasBall === "home") ? "away" : "home");
                }
            }
        }

        // リーグ戦績と個人スタッツへの完全同期
        homeTeam.pf += score.home; homeTeam.pa += score.away;
        awayTeam.pf += score.away; awayTeam.pa += score.home;
        if(score.home > score.away) { homeTeam.w++; awayTeam.l++; } else { awayTeam.w++; homeTeam.l++; }

        [...homeTeam.roster, ...awayTeam.roster].forEach(p => {
            let gb = pStats[p.id].gameBox;
            ['min','pts','reb','ast','stl','blk','fgm','fga','tpm','tpa','ftm','fta'].forEach(k => p.box[k] += gb[k]);
            p.recent.push(gb);
            if(p.recent.length > 82) p.recent.shift();
        });

        // 画面へのログ表示
        if(isVisual) {
            document.getElementById('match-score').innerText = `${score.home} - ${score.away}`;
            document.getElementById('match-log').innerHTML = logs.reverse().join('');
        }
    }

    // --- 初回起動 ---
    window.onload = function() {
        initWorld();
        // 初期状態は登録画面を見せる
        document.getElementById('game-ui').style.display = 'none';
        document.getElementById('reg-view').style.display = 'block';
    };
</script>
