<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BASKETBALL LIFE</title>
    <style>
        /* ================= 全体設定 ================= */
        body {
            background-color: #ffffff !important;
            color: #333333;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0; padding: 0; display: flex; justify-content: center;
        }
        .app-container {
            width: 100%; max-width: 800px; min-height: 100vh;
            background-color: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        /* ================= ヘッダー＆メニュー ================= */
        .header {
            background-color: #333; color: #fff; padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;
        }
        .header h1 { margin: 0; font-size: 18px; color: #ff6600; }
        .menu-btn {
            background: #ff6600; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer;
        }
        .nav-menu {
            display: none; background: #f8f9fa; border-bottom: 2px solid #ddd;
            padding: 10px; display: flex; gap: 10px; overflow-x: auto;
        }
        .nav-menu button {
            background: #fff; border: 1px solid #ccc; padding: 8px 12px;
            border-radius: 4px; cursor: pointer; white-space: nowrap; font-weight: bold;
        }

        /* ================= 共通パーツ ================= */
        .content-area { padding: 15px; }
        h2 { color: #ff6600; border-bottom: 2px solid #f1f2f6; padding-bottom: 5px; font-size: 18px; margin-top: 0;}
        
        /* ================= 登録画面 ================= */
        .reg-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .reg-table th, .reg-table td { border: 1px solid #ccc; padding: 10px; }
        .reg-table th { background-color: #f5f6fa; width: 35%; }
        .reg-table input, .reg-table select { width: 90%; padding: 8px; font-size: 16px; }
        .submit-btn {
            background-color: #5fa8d3; color: white; border: 2px solid #3b7b9e;
            padding: 10px 40px; font-size: 18px; font-weight: bold; cursor: pointer;
            border-radius: 4px; display: block; margin: 0 auto;
        }

        /* ================= ホーム画面 ================= */
        .top-status-bar {
            display: flex; justify-content: space-between; background: #f1f2f6;
            border: 1px solid #ccc; font-weight: bold; font-size: 14px; text-align: center;
        }
        .top-status-bar div { border-right: 1px solid #ccc; padding: 5px 10px; flex: 1; }
        .top-status-bar div:last-child { border-right: none; }
        
        .player-banner {
            color: #fff; padding: 15px; margin-top: 10px; border-radius: 5px;
            display: flex; align-items: center; cursor: pointer; position: relative;
            transition: background 0.3s;
        }
        .banner-icon {
            width: 60px; height: 60px; background: rgba(255,255,255,0.8); border-radius: 50%;
            margin-right: 15px; display: flex; align-items: center; justify-content: center; color: #333; font-weight: bold;
        }
        .banner-info .league-name { font-size: 12px; color: rgba(255,255,255,0.8); margin-bottom: 2px; }
        .banner-info .team-name { font-size: 20px; font-weight: bold; margin-bottom: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5);}
        .banner-info .player-detail { font-size: 16px; }
        
        .stats-summary-table { width: 100%; border-collapse: collapse; margin-top: 10px; text-align: center; }
        .stats-summary-table th, .stats-summary-table td { border: 1px solid #ccc; padding: 8px; }
        .stats-summary-table th { background: #f5f6fa; font-size: 12px; }
        .stats-summary-table td { font-size: 18px; font-weight: bold; }

        .play-match-btn {
            background-color: #e74c3c; color: white; border: none; padding: 10px; width: 100%;
            border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        /* ================= ロスター＆チーム一覧 ================= */
        .team-list-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .team-btn {
            background: #fff; border: 2px solid #ccc; padding: 15px; border-radius: 5px;
            text-align: center; font-weight: bold; cursor: pointer; font-size: 16px;
        }
        .roster-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 10px;}
        .roster-header { background: #333; color: #fff; }
        .roster-table th, .roster-table td { border: 1px solid #ccc; padding: 6px; text-align: center; }
        .starter-row { background-color: #fffde7; font-weight: bold; } /* スタメン用背景色 */
        .bench-row { background-color: #fcfcfc; }
        .roster-name-cell { text-align: left !important; font-size: 14px; color: #2980b9; cursor: pointer; text-decoration: underline;}
        
        /* ランクバッジ */
        .rank { display: inline-block; padding: 1px 4px; border-radius: 3px; color: #fff; font-weight: bold; font-size: 10px;}
        .rank-S { background-color: #ff00ff; color: #fff; } /* Sは特別感 */
        .rank-A { background-color: #e74c3c; }
        .rank-B { background-color: #e67e22; }
        .rank-C { background-color: #f1c40f; color: #000; }
        .rank-D { background-color: #2ecc71; }
        .rank-E { background-color: #3498db; }
        .rank-F { background-color: #9b59b6; }
        .rank-G { background-color: #7f8c8d; }

        /* ================= 試合実況画面 ================= */
        .match-log-box {
            background: #1e272e; color: #d2dae2; height: 400px; overflow-y: auto;
            padding: 10px; font-family: monospace; font-size: 13px; border-radius: 5px;
            display: flex; flex-direction: column-reverse; /* 最新を下に */
        }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #485460; padding-bottom: 5px; }
        .log-time { color: #f1c40f; font-weight: bold; }
        .log-team { font-weight: bold; color: #0fb9b1; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 登録画面 -->
    <div id="reg-view" class="content-area">
        <h2>プロバスケ志望届</h2>
        <table class="reg-table">
            <tr><th>選手名</th><td><input type="text" id="reg-name" placeholder="選手名"></td></tr>
            <tr>
                <th>ポジション</th>
                <td><select id="reg-pos"><option value="PG">PG</option><option value="SG">SG</option><option value="SF">SF</option><option value="PF">PF</option><option value="C">C</option></select></td>
            </tr>
            <tr>
                <th>アピールポイント</th>
                <td>
                    <select id="reg-appeal">
                        <option value="shootDribble">シュートオブドリブル</option>
                        <option value="layupDunk">レイアップ/ダンク</option>
                        <option value="middle">ミドルシュート</option>
                        <option value="three">スリーポイント</option>
                        <option value="agility">俊敏性</option>
                        <option value="physical">フィジカル</option>
                        <option value="rebound">リバウンド</option>
                        <option value="playmaking">プレイメイキング</option>
                        <option value="defense">ディフェンス</option>
                        <option value="mental">メンタル</option>
                        <option value="stamina">スタミナ</option>
                    </select>
                </td>
            </tr>
        </table>
        <button class="submit-btn" onclick="registerPlayer()">ドラフトへ進む</button>
    </div>

    <!-- メインUI -->
    <div id="game-ui" style="display: none;">
        <div class="header">
            <h1>BBL</h1>
            <button class="menu-btn" onclick="toggleMenu()">MENU ▼</button>
        </div>
        <div id="nav-menu" class="nav-menu">
            <button onclick="changeView('home')">🏠 ホーム</button>
            <button onclick="changeView('practice')">🏀 練習</button>
            <button onclick="changeView('team-list')">📋 チーム一覧</button>
            <button onclick="changeView('match')">🔥 試合</button>
        </div>

        <!-- ホーム画面 -->
        <div id="home-view" class="content-area">
            <div class="top-status-bar">
                <div>1年目</div><div>1軍</div><div>順位: -</div><div id="top-ap">行動: 15</div>
            </div>
            <div class="player-banner" id="home-banner" onclick="showPlayerDetail(currentUser.id)">
                <div class="banner-icon">ICON</div>
                <div class="banner-info">
                    <div class="league-name" id="home-league">リーグ1</div>
                    <div class="team-name" id="home-team">チーム名</div>
                    <div class="player-detail">
                        <span id="home-pos" style="font-size: 12px; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 3px;">PG</span>
                        <strong id="home-name">名前</strong>
                    </div>
                </div>
            </div>
            <table class="stats-summary-table">
                <tr><th>試合</th><th>平均得点</th><th>ｱｼｽﾄ</th><th>ﾘﾊﾞｳﾝﾄﾞ</th></tr>
                <tr><td id="stat-g">0</td><td id="stat-pts">---</td><td id="stat-ast">---</td><td id="stat-reb">---</td></tr>
            </table>
            <button class="play-match-btn" onclick="changeView('match'); startTestMatch();">▶ 次の試合を開始する (テスト用)</button>
        </div>

        <!-- 練習画面 (簡易) -->
        <div id="practice-view" class="content-area" style="display: none;">
            <h2>練習</h2><p>行動残数: <span id="prac-ap"></span></p>
            <button onclick="doPractice('three', 2)" style="padding:10px;">スリー練習</button>
        </div>

        <!-- チーム一覧画面 -->
        <div id="team-list-view" class="content-area" style="display: none;">
            <h2>チーム一覧</h2>
            <div class="team-list-grid" id="teams-grid"></div>
        </div>

        <!-- ロスター画面 -->
        <div id="roster-view" class="content-area" style="display: none;">
            <button onclick="changeView('team-list')" style="margin-bottom: 10px;">← 戻る</button>
            <h2 id="roster-team-name">チーム名</h2>
            <table class="roster-table" id="roster-table"></table>
        </div>

        <!-- 試合実況画面 -->
        <div id="match-view" class="content-area" style="display: none;">
            <h2 id="match-title">VS 敵チーム</h2>
            <div class="match-log-box" id="match-log"></div>
        </div>
        
        <!-- 選手詳細(使い回し用空枠) -->
        <div id="player-detail-view" class="content-area" style="display: none;">
            <button onclick="changeView('home')">← 戻る</button>
            <h2 id="detail-name">詳細</h2>
            <div id="detail-stats" style="font-size:14px; line-height: 1.8;"></div>
        </div>
    </div>
</div>

<script>
    // --- チームカラー30色 ---
    const TEAM_COLORS = [
        "#E03A3E", "#007A33", "#002B5C", "#CE1141", "#860038", "#00538C", "#98002E", "#F9A01B", "#002D62", "#1D1160",
        "#E31837", "#006BB6", "#552583", "#00471B", "#0C2340", "#98002E", "#00538A", "#002B5C", "#006BB6", "#007AC1",
        "#002B5C", "#0077C0", "#006BB6", "#1D1160", "#E03A3E", "#002B5C", "#0C2340", "#CE1141", "#002B5C", "#E31837"
    ];

    const MAX_SHOOT = 150;
    const MAX_STAMINA = 50;
    const MAX_NORMAL = 100;
    const POSITIONS = ["PG", "SG", "SF", "PF", "C"];

    let teams = [];
    let allPlayers = [];
    let currentUser = null;
    let playerIdCounter = 1;

    // --- ランク計算 (ユーザー指定基準) ---
    // S=MAX, A(90~99%) B(75~89%) C(60~74%) D(45~59%) E(30~44%) F(15~29%) G(1~14%)
    function getRank(val, max) {
        if (val >= max) return 'S';
        let p = Math.floor((val / max) * 100);
        if (p >= 90) return 'A';
        if (p >= 75) return 'B';
        if (p >= 60) return 'C';
        if (p >= 45) return 'D';
        if (p >= 30) return 'E';
        if (p >= 15) return 'F';
        return 'G';
    }

    // --- ステータス生成 ---
    function rollStat(max, isAppeal = false) {
        let minVal = 10; // Gランクの最低値
        if (isAppeal) return max; // アピールポイントは初期からMAX(Sランク)
        
        // 通常はE〜F(30%〜44%)付近
        let baseMax = Math.floor(max * 0.44);
        let baseMin = Math.floor(max * 0.15);
        return Math.floor(Math.random() * (baseMax - baseMin + 1)) + baseMin;
    }

    function createStats(appealPoint = null) {
        return {
            shootDribble: rollStat(MAX_SHOOT, appealPoint === 'shootDribble'),
            layupDunk: rollStat(MAX_SHOOT, appealPoint === 'layupDunk'),
            middle: rollStat(MAX_SHOOT, appealPoint === 'middle'),
            three: rollStat(MAX_SHOOT, appealPoint === 'three'),
            agility: rollStat(MAX_NORMAL, appealPoint === 'agility'),
            physical: rollStat(MAX_NORMAL, appealPoint === 'physical'),
            rebound: rollStat(MAX_NORMAL, appealPoint === 'rebound'),
            playmaking: rollStat(MAX_NORMAL, appealPoint === 'playmaking'),
            defense: rollStat(MAX_NORMAL, appealPoint === 'defense'),
            mental: rollStat(MAX_NORMAL, appealPoint === 'mental'),
            injuryResist: rollStat(MAX_NORMAL, appealPoint === 'injuryResist'),
            stamina: rollStat(MAX_STAMINA, appealPoint === 'stamina')
        };
    }

    // --- 初期化 ---
    function initWorld() {
        for (let i = 1; i <= 30; i++) {
            let team = { id: i, name: `チーム ${i}`, color: TEAM_COLORS[i-1], roster: [] };
            let comCount = 1;
            POSITIONS.forEach(pos => {
                for (let j = 0; j < 3; j++) { // 各ポジ3人
                    let p = {
                        id: playerIdCounter++, teamId: i, isUser: false, name: `COM${i}-${comCount++}`, pos: pos,
                        stats: createStats(), box: { pts:0, ast:0, reb:0, games:0 }
                    };
                    team.roster.push(p);
                    allPlayers.push(p);
                }
            });
            teams.push(team);
        }
    }

    function registerPlayer() {
        let name = document.getElementById('reg-name').value || "名無し";
        let pos = document.getElementById('reg-pos').value;
        let appeal = document.getElementById('reg-appeal').value;

        currentUser = {
            id: playerIdCounter++, isUser: true, name: name, pos: pos,
            stats: createStats(appeal), box: { pts:0, ast:0, reb:0, games:0 }, ap: 15
        };

        let tIndex = Math.floor(Math.random() * 30);
        let targetTeam = teams[tIndex];
        currentUser.teamId = targetTeam.id;

        // COMと入れ替え
        let cIdx = targetTeam.roster.findIndex(p => p.pos === pos);
        targetTeam.roster.splice(cIdx, 1, currentUser);
        allPlayers.push(currentUser);

        document.getElementById('reg-view').style.display = 'none';
        document.getElementById('game-ui').style.display = 'block';
        changeView('home');
    }

    // --- UI操作 ---
    function changeView(v) {
        ['home','practice','team-list','roster','match','player-detail'].forEach(id => {
            document.getElementById(id+'-view').style.display = 'none';
        });
        document.getElementById('nav-menu').style.display = 'none';
        
        if(v === 'home') renderHome();
        if(v === 'team-list') renderTeams();
        document.getElementById(v+'-view').style.display = 'block';
    }

    function toggleMenu() {
        let m = document.getElementById('nav-menu');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }

    function renderHome() {
        let myTeam = teams.find(t => t.id === currentUser.teamId);
        document.getElementById('home-banner').style.background = `linear-gradient(to right, ${myTeam.color}, #333)`;
        document.getElementById('home-team').innerText = myTeam.name;
        document.getElementById('home-name').innerText = currentUser.name;
        document.getElementById('home-pos').innerText = currentUser.pos;
        
        let b = currentUser.box;
        document.getElementById('stat-g').innerText = b.games;
        document.getElementById('stat-pts').innerText = b.games > 0 ? (b.pts/b.games).toFixed(1) : "---";
        document.getElementById('stat-ast').innerText = b.games > 0 ? (b.ast/b.games).toFixed(1) : "---";
        document.getElementById('stat-reb').innerText = b.games > 0 ? (b.reb/b.games).toFixed(1) : "---";
    }

    function renderTeams() {
        let grid = document.getElementById('teams-grid');
        grid.innerHTML = '';
        teams.forEach(t => {
            let b = document.createElement('div');
            b.className = 'team-btn'; b.innerText = t.name; b.style.borderColor = t.color;
            b.onclick = () => showRoster(t.id);
            grid.appendChild(b);
        });
    }

    function showRoster(teamId) {
        let team = teams.find(t => t.id === teamId);
        document.getElementById('roster-team-name').innerText = team.name;
        document.getElementById('roster-team-name').style.color = team.color;
        
        let tbl = document.getElementById('roster-table');
        tbl.innerHTML = `<tr class="roster-header"><th>Pos</th><th>選手名</th><th>ｼｭｰﾄD</th><th>ｽﾘｰ</th><th>守備</th></tr>`;

        // スタメン(各ポジ1人目)とベンチに分ける
        let starters = []; let bench = [];
        POSITIONS.forEach(pos => {
            let posPlayers = team.roster.filter(p => p.pos === pos);
            if(posPlayers.length > 0) {
                starters.push(posPlayers[0]);
                bench.push(...posPlayers.slice(1));
            }
        });

        const addRow = (p, isStarter) => {
            let tr = document.createElement('tr');
            tr.className = isStarter ? "starter-row" : "bench-row";
            if(p.isUser) tr.style.border = "2px solid #ff6600";
            
            let rS = getRank(p.stats.shootDribble, MAX_SHOOT);
            let r3 = getRank(p.stats.three, MAX_SHOOT);
            let rD = getRank(p.stats.defense, MAX_NORMAL);

            tr.innerHTML = `<td>${isStarter?'★':''}${p.pos}</td>
                <td class="roster-name-cell" onclick="showPlayerDetail(${p.id})">${p.name}</td>
                <td><span class="rank rank-${rS}">${p.stats.shootDribble}(${rS})</span></td>
                <td><span class="rank rank-${r3}">${p.stats.three}(${r3})</span></td>
                <td><span class="rank rank-${rD}">${p.stats.defense}(${rD})</span></td>`;
            tbl.appendChild(tr);
        };

        starters.forEach(p => addRow(p, true));
        bench.forEach(p => addRow(p, false));

        changeView('roster');
    }

    function showPlayerDetail(id) {
        let p = allPlayers.find(x => x.id === id);
        document.getElementById('detail-name').innerText = `${p.name} (${p.pos})`;
        
        let html = "";
        const lines = [
            {n:"ｼｭｰﾄD", v:p.stats.shootDribble, m:MAX_SHOOT}, {n:"3P", v:p.stats.three, m:MAX_SHOOT},
            {n:"俊敏", v:p.stats.agility, m:MAX_NORMAL}, {n:"守備", v:p.stats.defense, m:MAX_NORMAL},
            {n:"スタミナ", v:p.stats.stamina, m:MAX_STAMINA}
        ];
        lines.forEach(l => {
            let r = getRank(l.v, l.m);
            html += `${l.n}: ${l.v} <span class="rank rank-${r}">${r}</span><br>`;
        });
        document.getElementById('detail-stats').innerHTML = html;
        changeView('player-detail');
    }

    // --- 試合エンジン (PBPジェネレーター) ---
    function startTestMatch() {
        let myTeam = teams.find(t => t.id === currentUser.teamId);
        let enemyTeam = teams[Math.floor(Math.random() * 30)];
        while(enemyTeam.id === myTeam.id) enemyTeam = teams[Math.floor(Math.random() * 30)];

        document.getElementById('match-title').innerText = `${myTeam.name} VS ${enemyTeam.name}`;
        let logBox = document.getElementById('match-log');
        logBox.innerHTML = ""; // クリア

        // 各チームスタメン抽出
        let t1 = POSITIONS.map(pos => myTeam.roster.find(p => p.pos === pos));
        let t2 = POSITIONS.map(pos => enemyTeam.roster.find(p => p.pos === pos));
        
        let logs = [];
        logs.push(`<div class="log-entry"><span class="log-time">残り12:00</span> <span class="log-team">${myTeam.name}</span> メンバーチェンジ (オンコート: ${t1.map(p=>p.name).join(', ')})</div>`);
        logs.push(`<div class="log-entry"><span class="log-time">残り12:00</span> <span class="log-team">${enemyTeam.name}</span> メンバーチェンジ (オンコート: ${t2.map(p=>p.name).join(', ')})</div>`);
        logs.push(`<div class="log-entry"><span class="log-time">残り12:00</span> ティップオフ！</div>`);

        let time = 720; // 12分=720秒
        let hasBall = Math.random() > 0.5 ? 1 : 2;

        while(time > 0) {
            let clockPass = Math.floor(Math.random() * 15) + 10;
            time -= clockPass;
            if(time < 0) time = 0;
            let m = Math.floor(time / 60);
            let s = time % 60;
            let timeStr = `残り${m}:${s.toString().padStart(2,'0')}`;

            let offTeam = hasBall === 1 ? myTeam : enemyTeam;
            let defTeam = hasBall === 1 ? enemyTeam : myTeam;
            let offPlayers = hasBall === 1 ? t1 : t2;
            let defPlayers = hasBall === 1 ? t2 : t1;

            let shooter = offPlayers[Math.floor(Math.random() * 5)];
            let defender = defPlayers[Math.floor(Math.random() * 5)];

            // 簡易判定
            let isTurnover = Math.random() < 0.15;
            if(isTurnover) {
                logs.push(`<div class="log-entry"><span class="log-time">${timeStr}</span> <span class="log-team">${offTeam.name}</span> ${shooter.name} がターンオーバー。<span class="log-team">${defTeam.name}</span> ${defender.name} がボールを奪う！</div>`);
                hasBall = hasBall === 1 ? 2 : 1;
                continue;
            }

            let is3P = Math.random() < 0.35;
            let type = is3P ? "3Pシュート" : "シュート";
            let makeRate = is3P ? (shooter.stats.three / MAX_SHOOT)*0.6 : (shooter.stats.shootDribble / MAX_SHOOT)*0.8;
            if(Math.random() < makeRate) {
                // 成功
                shooter.box.pts += is3P ? 3 : 2;
                let astPlayer = offPlayers[Math.floor(Math.random() * 5)];
                let astText = (astPlayer !== shooter && Math.random() < 0.5) ? ` (${astPlayer.name} のアシスト)` : "";
                if(astText !== "") astPlayer.box.ast += 1;
                
                logs.push(`<div class="log-entry"><span class="log-time">${timeStr}</span> <span class="log-team">${offTeam.name}</span> ${shooter.name} が${type}を沈める！${astText}</div>`);
                hasBall = hasBall === 1 ? 2 : 1;
            } else {
                // 失敗 → リバウンド
                let dist = (Math.random() * 20 + 5).toFixed(1);
                logs.push(`<div class="log-entry"><span class="log-time">${timeStr}</span> <span class="log-team">${offTeam.name}</span> ${shooter.name} が${type}を放つも失敗 (距離: ${dist} フィート)</div>`);
                
                let rebPlayer = defPlayers[Math.floor(Math.random() * 5)]; // 防御側リバウンド高確率
                if(Math.random() < 0.2) rebPlayer = offPlayers[Math.floor(Math.random() * 5)]; // オフェンスリバウンド
                
                rebPlayer.box.reb += 1;
                let rebTeam = t1.includes(rebPlayer) ? myTeam : enemyTeam;
                logs.push(`<div class="log-entry"><span class="log-time">${timeStr}</span> <span class="log-team">${rebTeam.name}</span> ${rebPlayer.name} がリバウンドをキャッチ</div>`);
                hasBall = t1.includes(rebPlayer) ? 1 : 2;
            }
        }
        
        logs.push(`<div class="log-entry"><span class="log-time">0:00</span> 第1クォーター終了</div>`);
        
        // ログを画面に流し込む（新しいのが下になるようにHTMLを入れるが、CSSでflex-direction-reverseしてるので下から上へ積まれる）
        logBox.innerHTML = logs.reverse().join('');

        // 試合数増加
        myTeam.roster.forEach(p => p.box.games++);
        enemyTeam.roster.forEach(p => p.box.games++);
    }

    window.onload = initWorld;
</script>
</body>
</html>
